paths:
  /Agreement/MultiPartyAgreement/create:
    post:
      operationId: create_MultiPartyAgreement
      summary: Create a MultiPartyAgreement contract
      tags:
        - Agreement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MultiPartyAgreement_CreateArgs'
      responses:
        '200':
          description: Contract created
          content:
            application/json:
              schema:
                type: object
                properties:
                  updateId:
                    type: string
                  completionOffset:
                    type: integer
  /Agreement/MultiPartyAgreement/query:
    post:
      operationId: query_MultiPartyAgreement
      summary: Query active MultiPartyAgreement contracts
      tags:
        - Agreement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - activeAtOffset
              properties:
                activeAtOffset:
                  type: integer
                  description: Get from /v2/state/ledger-end
      responses:
        '200':
          description: List of active contracts
          content:
            application/json:
              schema:
                type: object
                properties:
                  activeContracts:
                    type: array
                    items:
                      $ref: '#/components/schemas/MultiPartyAgreement_Contract'
  /Agreement/MultiPartyAgreement/{contractId}/exercise/AddParty:
    post:
      operationId: exercise_AddParty
      summary: Exercise AddParty on MultiPartyAgreement
      description: ✅ Non-consuming — contract stays active
      tags:
        - Agreement
      parameters:
        - name: contractId
          in: path
          required: true
          schema:
            type: string
            format: daml-contract-id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MultiPartyAgreement_Choice_AddParty'
      responses:
        '200':
          description: AddParty exercised successfully
        '404':
          description: Contract not found or already archived
  /Agreement/MultiPartyAgreement/{contractId}/exercise/Close:
    post:
      operationId: exercise_Close
      summary: Exercise Close on MultiPartyAgreement
      description: ⚠️ Consuming — this will archive the contract
      tags:
        - Agreement
      parameters:
        - name: contractId
          in: path
          required: true
          schema:
            type: string
            format: daml-contract-id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MultiPartyAgreement_Choice_Close'
      responses:
        '200':
          description: Close exercised successfully
        '404':
          description: Contract not found or already archived
